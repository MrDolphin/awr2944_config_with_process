cfarCfg -1 0 2 8 4 3 0 12 1
cfarCfg -1 1 0 4 2 3 1 12 1
multiObjBeamForming -1 1 0.5
calibDcRangeSig -1 0 -5 8 256
clutterRemoval -1 1
