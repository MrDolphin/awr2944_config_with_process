<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <title>海洋雷达调试公告</title>
    <style>
        @page {
            size: A4;
            margin: 0;
        }

        body {
            margin: 0;
            padding: 2.5cm;
            font-family: 'PingFang SC', 'Microsoft YaHei', 'Segoe UI', sans-serif;
            text-align: center;
            background-color: white;
            color: #2D3748;
            height: 297mm;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .header {
            font-size: 80pt;
            font-weight: 800;
            color: #3182CE;
            line-height: 1.2;
            letter-spacing: 5pt;
            margin-bottom: 20pt;
        }

        .subtitle {
            font-size: 28pt;
            color: #4A5568;
            letter-spacing: 2pt;
            margin-bottom: 80pt;
            font-weight: 300;
        }

        .main-msg {
            font-size: 50pt;
            font-weight: 900;
            color: #2D3748;
            border-top: 3pt solid #E2E8F0;
            border-bottom: 3pt solid #E2E8F0;
            padding: 50pt 0;
            margin-bottom: 80pt;
        }

        .contact-info {
            font-size: 32pt;
            font-weight: 600;
            color: #4A5568;
        }

        .phone {
            font-size: 48pt;
            font-weight: 800;
            color: #3182CE;
            margin-top: 20pt;
            font-family: 'Consolas', 'Courier New', monospace;
        }

        .footer {
            position: absolute;
            bottom: 2.5cm;
            left: 0;
            width: 100%;
            font-size: 16pt;
            color: #CBD5E0;
        }
    </style>
</head>

<body>
    <div class="header">实验中</div>
    <div class="subtitle">EXPERIMENT IN PROGRESS</div>

    <div class="main-msg">
        雷达数据采集中<br>
        <span style="color: #3182CE; font-size: 60pt;"><b>请勿移动</b></span>
    </div>

    <div class="contact-info">
        如有需要请联系负责人：
        <div class="phone">151-6519-8387</div>
    </div>


</body>

</html>
